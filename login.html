<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bestie App</title>
    <link rel="icon" type="image/jpeg" href="assets/img/Screenshot%202026-04-22%20235700.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'outfit': ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        'bestie-pink': '#FF6B9D',
                        'bestie-purple': '#C084FC',
                        'bestie-cyan': '#22D3EE',
                        'bestie-dark': '#0A0A0F',
                        'bestie-card': '#12121A',
                    }
                }
            }
        }

        function handleCredentialResponse(response) {
            // Here you would typically send the JWT to your server for verification
            // For this demo, we'll just redirect to the main page
            console.log("ID: " + response.credential);
            window.location.href = 'pricing.html';
        }

        window.onload = function () {
            google.accounts.id.initialize({
                client_id: '782447604911-1l2v0ujn3dofie16m1gs5f358jcn8pb9.apps.googleusercontent.com', // Replace with your actual Google Client ID
                callback: handleCredentialResponse
            });
            google.accounts.id.renderButton(
                document.getElementById("g_id_signin"),
                { theme: "outline", size: "medium" }
            );
            google.accounts.id.prompt(); // also display the One Tap dialog
        }
    </script>
</head>
<body class="bg-bestie-dark text-white font-outfit overflow-x-hidden">

    <!-- Animated Background -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="absolute top-0 left-1/4 w-[600px] h-[600px] bg-bestie-pink/20 blur-[150px] rounded-full animate-pulse"></div>
        <div class="absolute bottom-0 right-1/4 w-[500px] h-[500px] bg-bestie-purple/15 blur-[120px] rounded-full animate-pulse" style="animation-delay: 1s;"></div>
    </div>

    <!-- Navigation -->
    <nav class="relative z-10 py-6 px-6 md:px-12">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-bestie-pink to-bestie-purple flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                </div>
                <span class="text-xl font-bold tracking-tight">Bestie</span>
            </a>
            <div class="hidden md:flex items-center gap-8">
        </div>
    </nav>

    <!-- Login Section -->
    <section class="relative z-10 pt-32 pb-24 px-6 md:px-12">
        <div class="max-w-md mx-auto">
            <div class="bg-bestie-card/50 border border-white/10 rounded-3xl p-8 text-center">
                <h1 class="text-3xl font-bold mb-6">Welcome to Bestie</h1>
                <p class="text-gray-400 mb-8">Sign in to start your relationship journey</p>
                
                <div id="g_id_signin" class="mb-6 flex justify-center"></div>
                
                <p class="text-sm text-gray-500">By continuing, you agree to our <a href="" class="text-bestie-cyan hover:text-white">Terms of Service</a> and <a href="" class="text-bestie-cyan hover:text-white">Privacy Policy</a></p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="relative z-10 py-12 px-6 md:px-12 border-t border-white/5">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-bestie-pink to-bestie-purple flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                    </div>
                    <span class="font-bold">Bestie - Your AI Relationship Coach</span>
                </div>
                <div class="flex items-center gap-6 text-sm text-gray-500">
                    
                </div>
                <div class="text-sm text-gray-500">© 2026 Bestie App. All rights reserved.</div>
            </div>
        </div>
    </footer>

    <script src="assets/js/script.js"></script>
</body>
</html>
