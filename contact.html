<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Bestie App</title>
    <link rel="icon" type="image/jpeg" href="assets/img/Screenshot%202026-04-22%20235700.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        select {
            background-color: rgba(18, 18, 26, 0.8) !important;
            color: white;
        }
        select option {
            background-color: #12121a !important;
            color: white;
        }
        select option:hover {
            background-color: #1a1a2e !important;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'outfit': ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        'bestie-pink': '#FF6B9D',
                        'bestie-purple': '#C084FC',
                        'bestie-cyan': '#22D3EE',
                        'bestie-dark': '#0A0A0F',
                        'bestie-card': '#12121A',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bestie-dark text-white font-outfit overflow-x-hidden">

    <!-- Animated Background -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="absolute top-0 left-1/4 w-[600px] h-[600px] bg-bestie-pink/20 blur-[150px] rounded-full animate-pulse"></div>
        <div class="absolute bottom-0 right-1/4 w-[500px] h-[500px] bg-bestie-purple/15 blur-[120px] rounded-full animate-pulse" style="animation-delay: 1s;"></div>
    </div>

     <!-- Navigation - Sticky with Mobile Menu -->
    <nav id="navbar" class="sticky top-0 z-50 bg-bestie-dark/80 backdrop-blur-lg border-b border-white/5 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-6 md:px-12">
            <div class="flex items-center justify-between h-20">
                <!-- Logo -->
                <a href="index.html" class="flex items-center gap-3 flex-shrink-0">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-bestie-pink to-bestie-purple flex items-center justify-center shadow-lg">
                        <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                    </div>
                    <span class="text-xl font-bold tracking-tight">Bestie</span>
                </a>
                <div class="flex items-center gap-4">
                    <!-- Mobile Menu Button -->
                    <button id="mobile-menu-btn" class="lg:hidden p-2 rounded-lg hover:bg-white/5 transition-colors" aria-label="Toggle menu">
                        <svg id="menu-icon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                        <svg id="close-icon" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Mobile Menu -->
            <div id="mobile-menu" class="lg:hidden hidden max-h-0 overflow-hidden transition-all duration-300">
                <div class="py-6 space-y-4 border-t border-white/10"></div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Contact Hero -->
    <section class="pt-32 pb-16 px-6 md:px-12">
        <div class="max-w-4xl mx-auto text-center">
            <span class="inline-block px-4 py-1.5 text-xs font-bold uppercase tracking-widest text-bestie-cyan bg-bestie-cyan/10 border border-bestie-cyan/20 rounded-full mb-8">Get in Touch</span>
            <h1 class="text-5xl md:text-6xl font-extrabold mb-6">
                We'd Love to <span class="bg-gradient-to-r from-bestie-pink to-bestie-purple bg-clip-text text-transparent">Hear From You</span>
            </h1>
            <p class="text-xl text-gray-400 max-w-2xl mx-auto">
                Have questions? Need support? Want to partner with us? Drop us a message!
            </p>
        </div>
    </section>

    <!-- Contact Form -->
    <section class="relative z-10 py-12 px-6 md:px-12 pb-24">
        <div class="max-w-2xl mx-auto">
            <div class="p-8 md:p-10 bg-bestie-card/50 border border-white/10 rounded-3xl">
                <form class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-semibold text-gray-300 mb-2">Name</label>
                            <input type="text" placeholder="Your name" class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:border-bestie-purple focus:ring-1 focus:ring-bestie-purple outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-300 mb-2">Email</label>
                            <input type="email" placeholder="you@example.com" class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:border-bestie-purple focus:ring-1 focus:ring-bestie-purple outline-none transition-all">
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-semibold text-gray-300 mb-2">Subject</label>
                        <select class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white focus:border-bestie-purple focus:ring-1 focus:ring-bestie-purple outline-none transition-all">
                            <option value="" class="text-gray-500">Select a topic</option>
                            <option value="support" class="text-white">Technical Support</option>
                            <option value="billing" class="text-white">Billing Question</option>
                            <option value="partnership" class="text-white">Partnership Inquiry</option>
                            <option value="feedback" class="text-white">Feedback</option>
                            <option value="other" class="text-white">Other</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-semibold text-gray-300 mb-2">Message</label>
                        <textarea rows="5" placeholder="Tell us what's on your mind..." class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:border-bestie-purple focus:ring-1 focus:ring-bestie-purple outline-none transition-all resize-none"></textarea>
                    </div>
                    
                    <button type="submit" class="w-full py-4 bg-gradient-to-r from-bestie-pink to-bestie-purple rounded-xl font-bold text-lg hover:shadow-[0_0_30px_rgba(255,107,157,0.4)] transition-all transform hover:scale-[1.02]">
                        Send Message
                    </button>
                </form>
            </div>
        </div>
    </section>

    <!-- Contact Options -->
    <section class="relative z-10 py-16 px-6 md:px-12 bg-black/30">
        <div class="max-w-4xl mx-auto">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="text-center p-8 bg-bestie-card/30 border border-white/5 rounded-2xl">
                    <div class="w-14 h-14 mx-auto rounded-xl bg-bestie-pink/20 flex items-center justify-center mb-4">
                        <svg class="w-7 h-7 text-bestie-pink" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    </div>
                    <h3 class="font-bold mb-2">Email</h3>
                    <a href="mailto:hello@bestie.app" class="text-bestie-purple hover:underline">hello@bestie.app</a>
                </div>
                
                <div class="text-center p-8 bg-bestie-card/30 border border-white/5 rounded-2xl">
                    <div class="w-14 h-14 mx-auto rounded-xl bg-bestie-purple/20 flex items-center justify-center mb-4">
                        <svg class="w-7 h-7 text-bestie-purple" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <h3 class="font-bold mb-2">Response Time</h3>
                    <p class="text-gray-400">Within 24 hours</p>
                </div>
                
                <div class="text-center p-8 bg-bestie-card/30 border border-white/5 rounded-2xl">
                    <div class="w-14 h-14 mx-auto rounded-xl bg-bestie-cyan/20 flex items-center justify-center mb-4">
                        <svg class="w-7 h-7 text-bestie-cyan" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </div>
                    <h3 class="font-bold mb-2">Location</h3>
                <p class="text-gray-400">Kampala, Uganda</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="relative z-10 py-12 px-6 md:px-12 border-t border-white/5">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-bestie-pink to-bestie-purple flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                    </div>
                    <span class="font-bold">Bestie</span>
                </div>
                <div class="text-sm text-gray-500">
                    © 2026 Bestie App. All rights reserved.
                </div>
            </div>
        </div>
    </footer>

    <script src="assets/js/script.js"></script>
    <script>
        // Mobile menu toggle
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuIcon = document.getElementById('menu-icon');
        const closeIcon = document.getElementById('close-icon');

        mobileMenuBtn.addEventListener('click', () => {
            const isHidden = mobileMenu.classList.contains('hidden');
            
            if (isHidden) {
                mobileMenu.classList.remove('hidden');
                mobileMenu.style.maxHeight = mobileMenu.scrollHeight + 'px';
                menuIcon.classList.add('hidden');
                closeIcon.classList.remove('hidden');
            } else {
                mobileMenu.style.maxHeight = '0';
                menuIcon.classList.remove('hidden');
                closeIcon.classList.add('hidden');
                setTimeout(() => {
                    mobileMenu.classList.add('hidden');
                }, 300);
            }
        });

        // Close mobile menu when clicking on a link
        const mobileLinks = mobileMenu.querySelectorAll('a');
        mobileLinks.forEach(link => {
            link.addEventListener('click', () => {
                mobileMenu.style.maxHeight = '0';
                menuIcon.classList.remove('hidden');
                closeIcon.classList.add('hidden');
                setTimeout(() => {
                    mobileMenu.classList.add('hidden');
                }, 300);
            });
        });

        // Navbar scroll effect
        let lastScroll = 0;
        const navbar = document.getElementById('navbar');
        
        window.addEventListener('scroll', () => {
            const currentScroll = window.pageYOffset;
            
            if (currentScroll > 100) {
                navbar.classList.add('bg-bestie-dark/95', 'shadow-lg');
                navbar.classList.remove('bg-bestie-dark/80');
            } else {
                navbar.classList.remove('bg-bestie-dark/95', 'shadow-lg');
                navbar.classList.add('bg-bestie-dark/80');
            }
            
            lastScroll = currentScroll;
        });
    </script>
</body>
</html>
